<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow circles -->
  <circle cx="600" cy="315" r="280" fill="rgba(124,58,237,0.08)"/>
  <circle cx="600" cy="315" r="180" fill="rgba(124,58,237,0.06)"/>
  
  <!-- Logo box -->
  <rect x="520" y="140" width="160" height="160" rx="44" fill="url(#grad)"/>
  <text x="600" y="248" font-size="80" text-anchor="middle">👋</text>
  
  <!-- Title -->
  <text x="600" y="380" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="white">ChatNear</text>
  
  <!-- Subtitle -->
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="rgba(148,163,184,0.8)">Meet people around you, instantly</text>
  
  <!-- Features row -->
  <text x="350" y="520" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="rgba(148,163,184,0.6)">📡 Radar</text>
  <text x="480" y="520" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="rgba(148,163,184,0.6)">💬 Chat</text>
  <text x="610" y="520" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="rgba(148,163,184,0.6)">📍 Nearby</text>
  <text x="760" y="520" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="rgba(148,163,184,0.6)">👥 Friends</text>
  
  <!-- URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="rgba(124,58,237,0.8)">chatnear.vercel.app</text>
</svg>